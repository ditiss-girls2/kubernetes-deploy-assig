apiVersion: v1
kind: Service
metadata:
  name: hello-java-service
spec:
  selector:
    app: hello-java
  ports:
    - protocol: TCP
      port: 80          # The port the Service exposes
      targetPort: 8080  # The port your application is listening on
  type: LoadBalancer    # Use NodePort if you are on a local cluster like Minikube

